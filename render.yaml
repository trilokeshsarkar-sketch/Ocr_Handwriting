services:
  - type: web
    name: ocr-streamlit-app
    env: python
    plan: free

    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt

    startCommand: >
      streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

      - key: PYTHONUNBUFFERED
        value: "1"

      - key: TZ
        value: "UTC"

      # ✅ Cache paths (good practice)
      - key: TORCH_HOME
        value: "/opt/render/.cache/torch"
      - key: TRANSFORMERS_CACHE
        value: "/opt/render/.cache/transformers"
      - key: EASYOCR_MODULE_PATH
        value: "/opt/render/.cache/easyocr"

      # Optional
      - key: OCR_OUTPUT_DIR
        value: "/tmp/ocr_outputs"